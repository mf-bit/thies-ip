[modules]
; ----------------------------------------------------------------------
; 1. CORE ENGINE & DATABASE DRIVERS
; These must be preloaded so they are available when other modules start.
; ----------------------------------------------------------------------
autoload=yes

preload => res_odbc.so
preload => res_config_odbc.so
preload => res_sorcery_config.so
preload => res_sorcery_realtime.so
preload => res_sorcery_astdb.so

; ----------------------------------------------------------------------
; 2. PJSIP STACK & REALTIME IDENTIFICATION
; ----------------------------------------------------------------------
load => res_pjsip.so
load => res_pjsip_session.so
load => res_pjsip_registrar.so
load => res_pjsip_pubsub.so

; This module is CRITICAL for your "ps_endpoint_id_ips" magic table
load => res_pjsip_endpoint_identifier_ip.so

; ----------------------------------------------------------------------
; 3. CDR & LOGGING
; ----------------------------------------------------------------------
load => cdr_adaptive_odbc.so  ; Better than standard odbc for MySQL
noload => cdr_sqlite.so

; ----------------------------------------------------------------------
; 4. RESOURCE MODULES
; ----------------------------------------------------------------------
load => res_musiconhold.so
load => res_rtp_asterisk.so

; ----------------------------------------------------------------------
; 5. LEGACY / UNUSED (NOLOADS)
; Keeping your system clean and avoiding port conflicts.
; ----------------------------------------------------------------------
noload => chan_sip.so        ; We are using PJSIP, disable legacy SIP
noload => chan_alsa.so
noload => chan_console.so
noload => chan_oss.so
noload => chan_capi.so

noload => pbx_gtkconsole.so
noload => pbx_kdeconsole.so
noload => app_intercom.so

noload => chan_modem.so
noload => chan_modem_aopen.so
noload => chan_modem_bestdata.so
noload => chan_modem_i4l.so

noload => app_directory_odbc.so
noload => res_config_pgsql.so

[global]