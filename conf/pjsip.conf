[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; --- User A: 770000000 ---
[770000000]
type=endpoint
context=internal-users
direct_media=yes
allow_transfer=yes
dtmf_mode=rfc4733
disallow=all
allow=ulaw,alaw
auth=auth770000000
aors=770000000

[auth770000000]
type=auth
auth_type=userpass
username=770000000
password=pass

[770000000]
type=aor
max_contacts=5
remove_existing=yes

